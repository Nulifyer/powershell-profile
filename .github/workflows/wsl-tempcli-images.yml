name: Build wsl-tempcli images

on:
  push:
    branches: [main]
    paths:
      - 'Scripts/wsl-tempcli/dockerfiles/**'
      - 'Scripts/wsl-tempcli/catppuccin_mocha.omp.json'
  workflow_dispatch:
    inputs:
      distro:
        description: 'Distro to build (alpine, debian, kali, or all)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/nulifyer/wsl-tempcli

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        distro: [alpine, debian, kali]
    steps:
      - name: Filter by distro input
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.distro != 'all' &&
          github.event.inputs.distro != matrix.distro
        run: echo "Skipping ${{ matrix.distro }}"; exit 0

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Build and push slim
      - name: Build & push ${{ matrix.distro }}-slim
        uses: docker/build-push-action@v6
        with:
          context: Scripts/wsl-tempcli
          file: Scripts/wsl-tempcli/dockerfiles/${{ matrix.distro }}/slim.Dockerfile
          push: true
          tags: ${{ env.IMAGE_BASE }}:${{ matrix.distro }}-slim
          cache-from: type=gha,scope=${{ matrix.distro }}-slim
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-slim

      # Build and push full (depends on slim being pushed above)
      - name: Build & push ${{ matrix.distro }}-full
        uses: docker/build-push-action@v6
        with:
          context: Scripts/wsl-tempcli
          file: Scripts/wsl-tempcli/dockerfiles/${{ matrix.distro }}/full.Dockerfile
          push: true
          tags: ${{ env.IMAGE_BASE }}:${{ matrix.distro }}-full
          cache-from: type=gha,scope=${{ matrix.distro }}-full
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-full
