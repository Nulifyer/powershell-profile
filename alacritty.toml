#═══════════════════════════════════════════════════════════════════════════════
# Alacritty Configuration
# Location: %APPDATA%\alacritty\alacritty.toml
#═══════════════════════════════════════════════════════════════════════════════

#───────────────────────────────────────────────────────────────────────────────
# SHELL
#───────────────────────────────────────────────────────────────────────────────

[terminal]
osc52 = "CopyPaste"

[terminal.shell]
program = "pwsh"
args = ["-NoLogo"]

#───────────────────────────────────────────────────────────────────────────────
# WINDOW
#───────────────────────────────────────────────────────────────────────────────

[window]
opacity = 0.95
blur = true
decorations = "Full"
startup_mode = "Windowed"
title = "Alacritty"
dynamic_title = true

[window.dimensions]
columns = 120
lines = 30

[window.padding]
x = 10
y = 10

#───────────────────────────────────────────────────────────────────────────────
# FONT
#───────────────────────────────────────────────────────────────────────────────

[font]
size = 11.0

[font.normal]
family = "CaskaydiaMono NF"
style = "Regular"

[font.bold]
family = "CaskaydiaMono NF"
style = "Bold"

[font.italic]
family = "CaskaydiaMono NF"
style = "Italic"

[font.bold_italic]
family = "CaskaydiaMono NF"
style = "Bold Italic"

#───────────────────────────────────────────────────────────────────────────────
# CURSOR
#───────────────────────────────────────────────────────────────────────────────

[cursor.style]
shape = "Block"
blinking = "Off"

[cursor]
unfocused_hollow = true

#──────────────────────────────────────────────────────────────────���────────────
# SCROLLING
#───────────────────────────────────────────────────────────────────────────────

[scrolling]
history = 10000
multiplier = 3

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "ReceiveChar"

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "ReceiveChar"

# font size adjustments with Ctrl + Plus/Minus/0
[[keyboard.bindings]]
key = "Plus"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

# Word-by-word navigation with Ctrl+Left/Right
[[keyboard.bindings]]
key = "Left"
mods = "Control"
action = "ReceiveChar"

[[keyboard.bindings]]
key = "Right"
mods = "Control"
action = "ReceiveChar"

[[keyboard.bindings]]
key = "Backspace"
mods = "Control"
chars = "\u0008"

[[keyboard.bindings]]
key = "Delete"
mods = "Control"
action = "ReceiveChar"

# other custom bindings can be added here
[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"

[colors.primary]
background = "#1D2021"
foreground = "#DDC7A1"

[colors.cursor]
text = "CellBackground"
cursor = "#DDC7A1"

[colors.selection]
text = "CellBackground"
background = "#3C3836"

[colors.normal]
black   = "#141617"
red     = "#EA6962"
green   = "#A9B665"
yellow  = "#D8A657"
blue    = "#7DAEA3"
magenta = "#D3869B"
cyan    = "#89B482"
white   = "#DDC7A1"

[colors.bright]
black   = "#928374"
red     = "#E3746F"
green   = "#ABB578"
yellow  = "#D6AC67"
blue    = "#8CB0A8"
magenta = "#D699A9"
cyan    = "#98B593"
white   = "#DCCDB5"

